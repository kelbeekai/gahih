# MySQL DB
spring.datasource.url=${GAHIH_DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${GAHIH_DB_USERNAME}
spring.datasource.password=${GAHIH_DB_PASSWORD}

# H2 console off
spring.h2.console.enabled=false

# JPA prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf prod
spring.thymeleaf.cache=true

# File prod
file.upload-dir=${GAHIH_UPLOAD_DIR}

# Logging prod
logging.level.root=info
logging.level.com.gahih=info
logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.orm.jdbc.bind=off
logging.level.org.springframework.security=warn

# 관리자 계정 생성
app.admin.username=${GAHIH_ADMIN_USERNAME}
app.admin.password=${GAHIH_ADMIN_PASSWORD}
app.admin.nickname=${GAHIH_ADMIN_NICKNAME}
app.admin.email=${GAHIH_ADMIN_EMAIL}

# Reverse proxy / session cookie
server.forward-headers-strategy=framework
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Error response
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
q
