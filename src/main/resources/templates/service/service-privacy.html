<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('개인정보 처리방침')}"></th:block>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title">개인정보 처리방침</h2>
        <p class="text-muted">가힣의 개인정보 처리 기준을 안내합니다.</p>
    </section>

    <section class="card">
        <h3 class="card-title">1. 수집하는 정보</h3>
        <p>서비스는 회원가입과 이용 과정에서 아이디, 닉네임, 이메일 등의 정보를 수집할 수 있습니다.</p>

        <h3 class="card-title">2. 이용 목적</h3>
        <p>수집된 정보는 회원 식별, 로그인, 이메일 인증, 서비스 운영, 부정 이용 방지에 사용됩니다.</p>

        <h3 class="card-title">3. 보관 및 삭제</h3>
        <p>탈퇴 또는 최종 종료 처리된 계정의 정보는 운영정책에 따라 비식별화되거나 삭제될 수 있습니다.</p>

        <h3 class="card-title">4. 문의</h3>
        <p>개인정보 관련 문의는 운영문의 페이지를 통해 접수할 수 있습니다.</p>
    </section>
</main>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
