<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('운영문의')}"></th:block>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title">운영문의</h2>
        <p class="text-muted">서비스 운영 관련 문의 안내입니다.</p>
    </section>

    <section class="card">
        <h3 class="card-title">문의 방법</h3>
        <p>
            현재 가힣은 포트폴리오/초기 운영 준비 단계의 서비스입니다.
            운영 문의는 이용문의 게시판 또는 별도 안내된 연락 수단을 통해 접수할 수 있습니다.
        </p>

        <h3 class="card-title">처리 대상</h3>
        <p>계정 문제, 게시물 조치 이의, 신고 처리 문의, 개인정보 관련 문의 등을 접수할 수 있습니다.</p>
    </section>
</main>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
