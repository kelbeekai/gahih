<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('이용약관')}"></th:block>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title">이용약관</h2>
        <p class="text-muted">가힣 서비스 이용에 필요한 기본 약관입니다.</p>
    </section>

    <section class="card">
        <h3 class="card-title">1. 서비스 목적</h3>
        <p>가힣은 국가별 한인 커뮤니티 안에서 정보 공유와 소통을 돕기 위한 서비스입니다.</p>

        <h3 class="card-title">2. 회원의 의무</h3>
        <p>회원은 타인의 권리를 침해하거나 서비스 운영을 방해하는 행위를 해서는 안 됩니다.</p>

        <h3 class="card-title">3. 게시물 관리</h3>
        <p>운영정책에 위반되는 게시물은 블라인드, 삭제, 이용 제한 등의 조치를 받을 수 있습니다.</p>

        <h3 class="card-title">4. 약관 변경</h3>
        <p>서비스 운영 상황에 따라 약관은 변경될 수 있으며, 중요한 변경 사항은 서비스 내에서 안내합니다.</p>
    </section>
</main>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
