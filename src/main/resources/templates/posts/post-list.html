<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent(${selectedCategory != null ? selectedCategory.name + ' 게시글 목록' : '전체 게시글 목록'})}"></th:block>
    <script defer th:src="@{/js/common/page-size.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container">

    <th:block th:replace="~{posts/post-list-fragments/post-list-title :: postListTitle}"></th:block>

    <th:block th:replace="~{posts/post-list-fragments/post-list-search-form :: postListFilterForm}"></th:block>

    <th:block th:replace="~{posts/post-list-fragments/post-list-table :: postListTable}"></th:block>

    <th:block th:replace="~{posts/post-list-fragments/post-list-search-form :: postListKeywordSearchForm}"></th:block>

    <section class="card" th:if="${!postPage.isEmpty()}">
        <p th:text="|총 ${postPage.totalElements}건 · ${postPage.number + 1}/${postPage.totalPages} 페이지|"></p>

        <div class="actions"
             th:replace="~{fragments/pagination :: pager(
                ${postPage},
                @{/c/{communityCode}/posts(communityCode=${currentCommunity.code})},
                ${'categoryId=' + (condition.categoryId != null ? condition.categoryId : '')
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&secret=' + (condition.secret != null ? condition.secret : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
        </div>
    </section>
</main>

<script th:inline="javascript">
    window.addEventListener('DOMContentLoaded', function () {
        PageSizeManager.initPageSizeForm('postFilterForm');
    });
</script>
<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
