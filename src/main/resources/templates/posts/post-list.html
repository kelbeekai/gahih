<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent(${selectedCategory != null ? selectedCategory.name + ' 게시글 목록' : '전체 게시글 목록'})}"></th:block>
    <script defer th:src="@{/js/common/page-size.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title"
            th:text="${selectedCategory != null ? selectedCategory.name : '전체 게시글'}">
            게시글 목록
        </h2>

        <p class="text-muted"
           th:if="${selectedCategory != null}"
           th:text="${selectedCategory.description}">
            게시판 설명
        </p>

        <p class="text-muted" th:if="${selectedCategory == null}">
            전체 게시판의 글을 한 번에 볼 수 있습니다.
        </p>
    </section>

    <section class="card">
        <form id="postSearchForm"
              th:action="@{/c/{communityCode}/posts(communityCode=${currentCommunity.code})}"
              method="get"
              class="search-form">

            <input type="hidden" name="page" th:value="${postPage.number + 1}">
            <input type="hidden" data-role="current-page" th:value="${postPage.number + 1}">
            <input type="hidden" data-role="current-size" th:value="${postPage.size}">

            <input th:if="${selectedCategory != null}"
                   type="hidden"
                   name="categoryId"
                   th:value="${selectedCategory.id}">

            <div class="form-group" th:if="${selectedCategory == null}">
                <label class="form-label" for="categoryId">게시판</label>
                <select class="form-control" id="categoryId" name="categoryId">
                    <option value="">전체</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${condition.categoryId != null and condition.categoryId == category.id}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="keyword">검색</label>
                <input class="form-control"
                       id="keyword"
                       type="text"
                       name="keyword"
                       th:value="${condition.keyword}"
                       placeholder="제목, 내용, 작성자 검색">
            </div>

            <div class="form-group">
                <label class="form-label" for="sort">정렬</label>
                <select class="form-control" id="sort" name="sort">
                    <option value="LATEST"
                            th:selected="${condition.sort == T(com.gahih.domain.post.enumtype.PostSortType).LATEST}">
                        최신순
                    </option>
                    <option value="OLDEST"
                            th:selected="${condition.sort == T(com.gahih.domain.post.enumtype.PostSortType).OLDEST}">
                        오래된순
                    </option>
                    <option value="VIEWS"
                            th:selected="${condition.sort == T(com.gahih.domain.post.enumtype.PostSortType).VIEWS}">
                        조회수순
                    </option>
                    <option value="LIKE_COUNT"
                            th:selected="${condition.sort == T(com.gahih.domain.post.enumtype.PostSortType).LIKE_COUNT}">
                        좋아요순
                    </option>
                    <option value="COMMENT_COUNT"
                            th:selected="${condition.sort == T(com.gahih.domain.post.enumtype.PostSortType).COMMENT_COUNT}">
                        댓글순
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="size">목록 수</label>
                <select class="form-control" id="size" name="size" data-role="page-size-select">
                    <option value="20" th:selected="${condition.safeSize == 20}">20개씩</option>
                    <option value="40" th:selected="${condition.safeSize == 40}">40개씩</option>
                    <option value="60" th:selected="${condition.safeSize == 60}">60개씩</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="secret">비밀글</label>
                <select class="form-control" id="secret" name="secret">
                    <option value="" th:selected="${condition.secret == null}">전체</option>
                    <option value="true" th:selected="${condition.secret == true}">비밀글만</option>
                    <option value="false" th:selected="${condition.secret == false}">일반글만</option>
                </select>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">검색</button>

                <a class="btn btn-secondary"
                   th:href="@{/c/{communityCode}/posts(communityCode=${currentCommunity.code})}">
                    초기화
                </a>

                <a class="btn btn-primary"
                   th:if="${loginMember != null
                       and selectedCategory != null
                       and (!selectedCategory.adminWriteOnly or loginMember.role.name() == 'ADMIN')}"
                   th:href="@{/c/{communityCode}/posts/new(
                        communityCode=${currentCommunity.code},
                        source=${T(com.gahih.domain.post.enumtype.PostDetailSource).POST_LIST},
                        categoryId=${selectedCategory.id},
                        keyword=${condition.keyword},
                        secret=${condition.secret},
                        sort=${condition.sort},
                        page=${condition.safePage},
                        size=${condition.safeSize}
                   )}">
                    글 작성
                </a>
            </div>
        </form>
    </section>

    <section class="card">
        <div class="table-wrapper">
            <table class="common-table">
                <thead>
                    <tr>
                        <th class="table-cell-id">ID</th>
                        <th class="table-cell-category">카테고리</th>
                        <th class="table-cell-title">제목</th>
                        <th class="table-cell-writer">작성자</th>
                        <th class="table-cell-number">조회수</th>
                        <th class="table-cell-number">좋아요</th>
                        <th class="table-cell-date">작성일</th>
                    </tr>
                </thead>
                <tbody>

                    <tr th:each="post : ${pinnedPosts}"
                        style="background-color: #fff8e1;">
                        <td class="table-cell-id" th:text="${post.id}"></td>
                        <td class="table-cell-category" th:text="${post.categoryName}"></td>
                        <td class="table-cell-title">
                        <span th:if="${post.deletedOrBlinded}"
                              class="status-label"
                              th:text="${'[' + post.statusLabel + ']'}"></span>
                            <span th:if="${post.pinned}" class="icon-marker">📌</span>
                            <span th:if="${post.secret}" class="icon-marker">🔒</span>

                            <span class="table-title-text">
                                <a th:href="@{/c/{communityCode}/posts/{id}(
                                    communityCode=${currentCommunity.code},
                                    id=${post.id},
                                    categoryId=${condition.categoryId},
                                    keyword=${condition.keyword},
                                    secret=${condition.secret},
                                    sort=${condition.sort},
                                    page=${condition.safePage},
                                    size=${condition.safeSize}
                                    )}"
                                   th:text="${post.displayTitle}">
                                </a>

                            </span>
                            <span th:if="${post.hasAttachments}" th:text="|📎|"></span>
                            <span th:if="${post.hasComments}" th:text="| (${post.commentCount})|"></span>
                        </td>
                        <td class="table-cell-writer" th:text="${post.writerNickname}"></td>
                        <td class="table-cell-number" th:text="${post.viewCount}"></td>
                        <td class="table-cell-number" th:text="${post.likeCount}"></td>
                        <td class="table-cell-date">
                            <span th:text="${#temporals.format(post.displayTime, 'yyyy-MM-dd HH:mm')}"></span>
                            <span th:if="${post.edited}"
                                  class="detail-small-muted detail-inline-spaced">
                                (수정됨)
                            </span>
                        </td>
                    </tr>

                    <tr th:if="${postPage.isEmpty()}">
                        <td colspan="7">등록된 게시글이 없습니다.</td>
                    </tr>

                    <tr th:each="post : ${postPage.content}">
                        <td class="table-cell-id" th:text="${post.id}"></td>
                        <td class="table-cell-category" th:text="${post.categoryName}"></td>
                        <td class="table-cell-title">
                        <span th:if="${post.deletedOrBlinded}"
                              class="status-label"
                              th:text="${'[' + post.statusLabel + ']'}"></span>
                            <span th:if="${post.pinned}" class="icon-marker">📌</span>
                            <span th:if="${post.secret}" class="icon-marker">🔒</span>
                            <span class="table-title-text">
                                <a th:href="@{/c/{communityCode}/posts/{id}(
                                    communityCode=${currentCommunity.code},
                                    id=${post.id},
                                    categoryId=${condition.categoryId},
                                    keyword=${condition.keyword},
                                    secret=${condition.secret},
                                    sort=${condition.sort},
                                    page=${condition.safePage},
                                    size=${condition.safeSize}
                                    )}"
                                   th:text="${post.displayTitle}">
                                </a>
                            </span>
                            <span th:if="${post.hasAttachments}" th:text="|📎|"></span>
                            <span th:if="${post.hasComments}" th:text="| (${post.commentCount})|"></span>
                        </td>
                        <td class="table-cell-writer" th:text="${post.writerNickname}"></td>
                        <td class="table-cell-number" th:text="${post.viewCount}"></td>
                        <td class="table-cell-number" th:text="${post.likeCount}"></td>
                        <td class="table-cell-date">
                            <span th:text="${#temporals.format(post.displayTime, 'yyyy-MM-dd HH:mm')}"></span>
                            <span th:if="${post.edited}"
                                  class="detail-small-muted detail-inline-spaced">
                            (수정됨)
                        </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="card" th:if="${!postPage.isEmpty()}">
        <p th:text="|총 ${postPage.totalElements}건 · ${postPage.number + 1}/${postPage.totalPages} 페이지|"></p>

        <div class="actions"
             th:replace="~{fragments/pagination :: pager(
                ${postPage},
                @{/c/{communityCode}/posts(communityCode=${currentCommunity.code})},
                ${'categoryId=' + (condition.categoryId != null ? condition.categoryId : '')
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&secret=' + (condition.secret != null ? condition.secret : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
        </div>
    </section>
</main>

<script th:inline="javascript">
    window.addEventListener('DOMContentLoaded', function () {
        PageSizeManager.initPageSizeForm('postSearchForm');
    });
</script>
<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
