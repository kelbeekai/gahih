<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="postListTitle">
    <section class="card">
        <h2 class="card-title"
            th:text="${selectedCategory != null ? selectedCategory.name : '전체 게시글'}">
            게시글 목록
        </h2>

        <p class="text-muted"
           th:if="${selectedCategory != null}"
           th:text="${selectedCategory.description}">
            게시판 설명
        </p>

        <p class="text-muted" th:if="${selectedCategory == null}">
            전체 게시판의 글을 한 번에 볼 수 있습니다.
        </p>
    </section>
</th:block>

</html>
