<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('게시글 상세')}"></th:block>
    <script defer th:src="@{/js/posts/post-detail-comment.js}"></script>
    <script defer th:src="@{/js/posts/post-report-dropdown.js}"></script>
    <script defer th:src="@{/js/admin/admin-action-reason.js}"></script>
    <script defer th:src="@{/js/common/page-size.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container">

    <section th:if="${errorMessage}" class="card">
        <div class="global-error" th:text="${errorMessage}"></div>
    </section>

    <section class="card">
        <th:block th:replace="~{posts/post-detail-fragments/post-detail-header :: postHeader}"></th:block>

        <th:block th:if="${postDetail.viewable}">
            <th:block th:replace="~{posts/post-detail-fragments/post-detail-attachments :: attachments}"></th:block>

            <div th:if="${postDetail.reactionAllowed or isAdmin}"
                 class="post-control-row detail-block-spaced">
                <div th:if="${postDetail.reactionAllowed}" class="post-control-left">
                    <th:block th:replace="~{posts/post-detail-fragments/post-detail-reaction :: postReaction}"></th:block>
                </div>

                <div th:if="${isAdmin}" class="post-control-right admin-action-row">
                    <th:block th:replace="~{posts/post-detail-fragments/post-detail-actions :: postAdminActions}"></th:block>
                </div>
            </div>

        </th:block>
    </section>

    <th:block th:replace="~{posts/post-detail-fragments/post-detail-comments :: comments}"></th:block>

    <th:block th:replace="~{posts/post-detail-fragments/post-detail-comment-form :: commentForm}"></th:block>

    <th:block th:replace="~{posts/post-detail-fragments/post-detail-navigation :: navigation}"></th:block>

    <th:block th:replace="~{posts/post-detail-fragments/post-detail-context-list :: contextList}"></th:block>
</main>

<div th:replace="~{fragments/header :: siteFooter}"></div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (window.PageSizeManager) {
            PageSizeManager.initPageSizeForm('detailContextFilterForm');
        }
    });
</script>

</body>

</html>
