<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('게시글 수정')}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title">게시글 수정</h2>
    </section>

    <th:block th:replace="~{posts/post-form-fragments/post-edit-attachments :: postEditAttachments}"></th:block>

    <th:block th:replace="~{posts/post-form-fragments/post-edit-form-fields :: postEditFormFields}"></th:block>

    <section class="card">
        <a class="btn btn-secondary"
           th:href="@{/c/{communityCode}/posts/{id}(
                communityCode=${currentCommunity.code},
                id=${postId},
                fromCreate=${fromCreate},
                source=${detailContext.source},
                returnUrl=${detailContext.returnUrl},
                categoryId=${detailContext.categoryId},
                keyword=${detailContext.keyword},
                secret=${detailContext.secret},
                sort=${detailContext.sort},
                onlyWithAttachments=${detailContext.onlyWithAttachments},
                page=${detailContext.safePage},
                size=${detailContext.safeSize}
            )}">
            상세로 돌아가기
        </a>
    </section>
</main>

<script th:src="@{/js/posts/post-file-form.js}"></script>
<script th:inline="javascript">
    PostFileForm.init({
        formId: 'post-edit-form',
        fileInputId: 'attachments',
        selectedAttachmentsId: 'selected-attachments',
        attachmentCountId: 'attachment-count',
        attachmentSizeId: 'attachment-size',
        attachmentWarningId: 'attachment-warning',
        maxFileCount: 3,
        maxTotalSize: 30 * 1024 * 1024,
        existingAttachmentCount: /*[[${activeAttachmentCount}]]*/ 0,
        existingAttachmentTotalSize: /*[[${activeAttachmentTotalSize}]]*/ 0
    });
</script>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
