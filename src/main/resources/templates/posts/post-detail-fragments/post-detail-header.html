<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="postHeader">
    <h2 class="card-title">
        <span th:if="${postDetail.pinned}" class="icon-marker">📌</span>
        <span th:if="${postDetail.secret}" class="icon-marker">🔒</span>
        <span th:if="${postDetail.deletedOrBlinded}"
              class="status-label"
              th:text="${'[' + postDetail.statusLabel + ']'}"></span>
        <span th:text="${postDetail.displayTitle}">제목</span>
    </h2>

    <p th:if="${postDetail.pinned}" class="detail-muted">
        고정글로 등록된 게시글입니다.
    </p>

    <p>
        작성자:
        <button th:if="${postDetail.mentionableWriter}"
                type="button"
                class="mention-insert-btn mention-text-btn"
                th:attr="data-mention=${postDetail.writerNickname}"
                th:text="${postDetail.writerNickname}">
        </button>
        <span th:unless="${postDetail.mentionableWriter}"
              class="text-strong"
              th:text="${postDetail.writerNickname}"></span>
    </p>

    <div th:if="${loginMember != null
                 and !postDetail.writerAdmin
                 and loginMember.id != postDetail.writerId
                 and postDetail.canReportWriter}"
         class="detail-block-small-spaced">
        <details class="inline-details">
            <summary>작성자 신고</summary>
            <form th:action="@{/reports}"
                  method="post"
                  class="inline-report-form"
                  onsubmit="return confirm('이 회원을 신고하시겠습니까? 취소할 수 없습니다.');">

                <input type="hidden" name="targetType" value="MEMBER">
                <input type="hidden" name="targetId" th:value="${postDetail.writerId}">
                <input type="hidden" name="redirectUrl" th:value="${reportRedirectUrl}">
                <select class="form-control" name="reasonType">
                    <option value="ABUSE_OR_HARASSMENT">욕설/괴롭힘</option>
                    <option value="INAPPROPRIATE_NICKNAME">부적절한 닉네임</option>
                    <option value="IMPERSONATION_OR_FRAUD">사칭/사기</option>
                    <option value="OTHER">기타</option>
                </select>
                <button class="btn btn-danger btn-small" type="submit">제출</button>
            </form>
        </details>
    </div>

    <p>
        작성일:
        <span th:text="${#temporals.format(postDetail.displayTime, 'yyyy-MM-dd HH:mm')}"></span>
        <span th:if="${postDetail.edited}" class="detail-small-muted detail-inline-spaced">
                (수정됨)
            </span>
    </p>
    <p>카테고리: <span th:text="${postDetail.categoryName}"></span></p>
    <p>조회수: <span th:text="${postDetail.viewCount}"></span></p>

    <div th:if="${postDetail.canReportPost}"
         class="detail-block-small-spaced">
        <details class="inline-details">
            <summary>게시글 신고</summary>
            <form th:action="@{/reports}"
                  method="post"
                  class="inline-report-form"
                  onsubmit="return confirm('이 게시글을 신고하시겠습니까? 취소할 수 없습니다.');">

                <input type="hidden" name="targetType" value="POST">
                <input type="hidden" name="targetId" th:value="${postDetail.id}">
                <input type="hidden" name="redirectUrl" th:value="${reportRedirectUrl}">
                <select class="form-control" name="reasonType">
                    <option value="SPAM">스팸/광고</option>
                    <option value="ABUSE_OR_HARASSMENT">욕설/괴롭힘</option>
                    <option value="SEXUAL_OR_OBSCENE">음란/선정성</option>
                    <option value="VIOLENCE_OR_ILLEGAL">폭력/불법</option>
                    <option value="OTHER">기타</option>
                </select>
                <button class="btn btn-danger btn-small" type="submit">제출</button>
            </form>
        </details>
    </div>

    <div class="detail-block-spaced">
        <div th:if="${postDetail.blockedSecretPost}">
            <p>작성자와 관리자만 열람할 수 있는 게시글입니다.</p>
        </div>

        <div th:if="${!postDetail.blockedSecretPost}">
            <p th:if="${postDetail.contentBlockedByStatus}"
               th:text="${postDetail.content}"></p>

            <p th:if="${!postDetail.contentBlockedByStatus}"
               th:utext="${#strings.escapeXml(postDetail.content)}"></p>
        </div>
    </div>
</th:block>

</html>
