<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('비밀번호 재설정')}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${null})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title">새 비밀번호 설정</h2>

        <form th:action="@{/members/reset-password}" th:object="${memberPasswordResetRequest}" method="post">


            <div class="global-error" th:if="${#fields.hasGlobalErrors()}">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="newPassword">새 비밀번호</label>
                <input class="form-control" type="password" id="newPassword" th:field="*{newPassword}">
                <div class="field-error" th:errors="*{newPassword}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="newPasswordConfirm">새 비밀번호 확인</label>
                <input class="form-control" type="password" id="newPasswordConfirm" th:field="*{newPasswordConfirm}">
                <div class="field-error" th:errors="*{newPasswordConfirm}"></div>
            </div>

            <div class="form-group">
                <button class="btn btn-primary" type="submit">비밀번호 재설정</button>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
