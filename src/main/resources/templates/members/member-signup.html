<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('회원가입')}"></th:block>
    <th:block th:replace="~{fragments/layout :: csrfMeta}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${null})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title">회원가입</h2>

        <div class="form-guide-box">
            <!--<p class="form-guide-title">회원가입 이메일 인증 안내</p>-->
            <ul class="form-guide-list">
                <li>회원가입에는 인증코드 수신이 가능한 이메일이 필요합니다.</li>
                <li>이메일 인증은 이메일 당 최초 1회만 진행하시면 됩니다.</li>
                <li>인증 메일이 보이지 않으면 스팸함을 확인하거나 이메일 주소를 다시 확인해주세요.</li>
            </ul>
        </div>

        <form th:action="@{/members/signup}" th:object="${memberSignUpRequest}" method="post"
              id="signupForm"
              th:attr="data-email-verified=${signupEmailVerified}">

            <div class="global-error" th:if="${#fields.hasGlobalErrors()}">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="username">아이디</label>
                <input class="form-control" type="text" id="username" th:field="*{username}">
                <div class="field-error" th:errors="*{username}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">비밀번호</label>
                <input class="form-control" type="password" id="password" th:field="*{password}">
                <div class="field-error" th:errors="*{password}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="passwordConfirm">비밀번호 확인</label>
                <input class="form-control" type="password" id="passwordConfirm" th:field="*{passwordConfirm}">
                <div class="field-error" th:errors="*{passwordConfirm}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="nickname">닉네임</label>
                <input class="form-control" type="text" id="nickname" th:field="*{nickname}">
                <div class="field-error" th:errors="*{nickname}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">이메일</label>
                <input class="form-control" type="email" id="email" th:field="*{email}">
                <button class="btn btn-secondary btn-small" type="button" id="sendEmailCodeBtn">
                    인증코드 보내기
                </button>
                <div class="field-error" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="emailCode">인증코드</label>
                <input class="form-control" type="text" id="emailCode" maxlength="6" placeholder="6자리 숫자 입력">
                <button class="btn btn-secondary btn-small" type="button" id="verifyEmailCodeBtn">
                    인증 확인
                </button>
            </div>

            <div id="emailAuthMessage" class="form-group"></div>
            <div id="emailAuthTimer" class="form-group"></div>
            <div id="emailAuthVerified" class="form-group"
                 th:text="${signupEmailVerified} ? '이메일 인증이 완료되었습니다.' : ''"></div>

            <th:block th:replace="~{members/signup-fragments/member-signup-agreement-section :: memberSignupAgreementSection}"></th:block>

            <div class="form-group">
                <button class="btn btn-primary" type="submit" id="signUpSubmitBtn">회원가입</button>
            </div>
        </form>
    </section>

    <th:block th:replace="~{members/signup-fragments/member-signup-agreement-modals :: memberSignupAgreementModals}"></th:block>
</main>

<script defer th:src="@{/js/members/member-signup-agreement.js}"></script>
<script defer th:src="@{/js/members/member-signup-email-auth.js}"></script>
<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
