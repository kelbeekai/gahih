<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('아이디 찾기')}"></th:block>
    <th:block th:replace="~{fragments/layout :: csrfMeta}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${null})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title">아이디 찾기</h2>

        <p class="text-muted">
            가입 시 사용한 이메일을 입력하고 인증코드를 확인하세요.
        </p>

        <form id="findUsernameForm">
            <div class="form-group">
                <label class="form-label" for="email">이메일</label>
                <input class="form-control" type="email" id="email" name="email">
                <button class="btn btn-secondary btn-small" type="button" id="sendCodeBtn">
                    인증코드 보내기
                </button>
            </div>

            <div class="form-group">
                <label class="form-label" for="code">인증코드</label>
                <input class="form-control" type="text" id="code" name="code" maxlength="6" placeholder="6자리 숫자 입력">
                <button class="btn btn-secondary btn-small" type="button" id="verifyCodeBtn">
                    인증 확인
                </button>
            </div>

            <div id="messageBox" class="form-group"></div>
            <div id="timerBox" class="form-group"></div>

            <div class="form-group">
                <a class="btn btn-secondary" th:href="@{/members/login}">로그인으로 돌아가기</a>
            </div>
        </form>
    </section>
</main>

<script defer th:src="@{/js/members/member-find-username.js}"></script>
<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
