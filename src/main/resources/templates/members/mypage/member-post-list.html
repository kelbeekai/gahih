<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('내가 쓴 글')}"></th:block>
    <script defer th:src="@{/js/common/page-size.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title">내가 쓴 글</h2>

        <p class="text-muted" th:if="${member != null and member.suspended}">
            이용 제한 상태에서는 이용문의 게시판에 작성한 글만 확인할 수 있습니다.
        </p>
    </section>

    <th:block th:replace="~{members/mypage/member-post-list-fragments/member-post-search-form :: memberPostFilterForm}"></th:block>

    <th:block th:replace="~{members/mypage/member-post-list-fragments/member-post-table :: memberPostTable}"></th:block>

    <section class="card" th:if="${!postPage.isEmpty()}">
        <p th:text="|총 ${postPage.totalElements}건 · ${postPage.number + 1}/${postPage.totalPages} 페이지|"></p>

        <div class="actions"
             th:replace="~{fragments/pagination :: pager(
                ${postPage},
                @{/c/{communityCode}/mypage/posts(communityCode=${currentCommunity.code})},
                ${'categoryId=' + (condition.categoryId != null ? condition.categoryId : '')
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&secret=' + (condition.secret != null ? condition.secret : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
        </div>
    </section>

    <th:block th:replace="~{members/mypage/member-post-list-fragments/member-post-search-form :: memberPostKeywordSearchForm}"></th:block>
</main>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        if (window.PageSizeManager) {
            PageSizeManager.initPageSizeForm('myPostFilterForm');
        }
    });
</script>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
