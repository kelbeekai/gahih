<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent(${'가힣 - ' + currentCommunity.name + ' 커뮤니티'})}"></th:block>
    <script defer th:src="@{/js/common/home-board-intro.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container">
    <section class="card">
        <h2 class="card-title" th:text="|${currentCommunity.name} 커뮤니티|">국가 커뮤니티</h2>

        <div th:if="${loginMember == null}">
            <p>비로그인 상태입니다.</p>
            <p>회원가입 또는 로그인 후 게시글과 댓글 기능을 사용할 수 있습니다.</p>
        </div>

        <div th:if="${loginMember != null}">
            <p>
                <strong th:text="${loginMember.nickname}">닉네임</strong>님, 환영합니다.
            </p>
            <p th:text="|현재 ${currentCommunity.name} 커뮤니티에 입장했습니다.|">
                현재 커뮤니티에 입장했습니다.
            </p>
        </div>
    </section>

    <section class="card board-intro-card">
        <h2 class="card-title"
            id="board-intro-title"
            data-default-title="가힣은 어떤 커뮤니티인가요?">
            가힣은 어떤 커뮤니티인가요?
        </h2>

        <p id="board-intro-description"
           data-default-description="가힣은 전 세계 한인들이 유학, 이민, 지역생활, 여행, 주거, 구인구직 등 다양한 주제로 정보를 나누고 소통할 수 있도록 만든 커뮤니티 서비스입니다. 상단 게시판 메뉴에 마우스를 올리면 각 게시판의 용도를 확인할 수 있습니다.">
            가힣은 전 세계 한인들이 유학, 이민, 지역생활, 여행, 주거, 구인구직 등 다양한 주제로 정보를 나누고 소통할 수 있도록 만든 커뮤니티 서비스입니다.
        </p>
    </section>

    <section class="card">
        <h2 class="card-title">게시판 안내</h2>
        <ul class="board-summary-list">
            <li th:each="category : ${boardCategories}">
                <strong th:text="${category.name}">게시판명</strong>
                <span class="text-muted" th:text="${category.description}">게시판 설명</span>
            </li>
        </ul>
    </section>

    <section class="card">
        <h2 class="card-title">바로가기</h2>
        <p>
            <a class="btn btn-primary"
               th:href="@{/c/{communityCode}/posts(communityCode=${currentCommunity.code})}">
                전체 게시글 목록 보기
            </a>
            <a class="btn btn-secondary"
               th:href="@{/}">
                다른 국가 커뮤니티 선택하기
            </a>
        </p>
    </section>
</main>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
