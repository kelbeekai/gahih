<th:block th:fragment="pinMarker">
    <span class="icon-marker icon-marker-pin" title="고정글">
        <th:block th:replace="~{fragments/icons :: pin}"></th:block>
    </span>
</th:block>

<th:block th:fragment="lockMarker">
    <span class="icon-marker icon-marker-lock" title="비밀글">
        <th:block th:replace="~{fragments/icons :: lock}"></th:block>
    </span>
</th:block>

<th:block th:fragment="attachmentMarker">
    <span class="title-meta icon-title-meta icon-marker icon-marker-attachment" title="첨부파일 있음">
        <th:block th:replace="~{fragments/icons :: paperclip}"></th:block>
    </span>
</th:block>

<th:block th:fragment="attachmentIcon(attachment)">
    <span th:if="${attachment.image}"
          class="icon-marker icon-marker-attachment icon-marker-file-image"
          title="이미지 첨부">
        <th:block th:replace="~{fragments/icons :: photo}"></th:block>
    </span>

    <span th:if="${!attachment.image and attachment.extension == 'pdf'}"
          class="icon-marker icon-marker-file icon-marker-file-pdf"
          title="PDF 첨부">
        <th:block th:replace="~{fragments/icons :: filePdf}"></th:block>
    </span>

    <span th:if="${!attachment.image and attachment.extension == 'txt'}"
          class="icon-marker icon-marker-file icon-marker-file-txt"
          title="TXT 첨부">
        <th:block th:replace="~{fragments/icons :: fileTxt}"></th:block>
    </span>

    <span th:if="${!attachment.image and attachment.extension == 'zip'}"
          class="icon-marker icon-marker-file icon-marker-file-zip"
          title="ZIP 첨부">
        <th:block th:replace="~{fragments/icons :: fileZip}"></th:block>
    </span>

    <span th:if="${!attachment.image
                  and attachment.extension != 'pdf'
                  and attachment.extension != 'txt'
                  and attachment.extension != 'zip'}"
          class="icon-marker icon-marker-attachment"
          title="첨부파일">
        <th:block th:replace="~{fragments/icons :: paperclip}"></th:block>
    </span>
</th:block>

</html>
