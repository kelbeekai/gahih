<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('관리자 로그')}"></th:block>
    <script defer th:src="@{/js/common/page-size.js}"></script>
    <script defer th:src="@{/js/admin/admin-log-search.js}"></script>
    <script defer th:src="@{/js/admin/admin-log-snapshot-modal.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container admin-container">
    <section class="card">
        <h2 class="card-title">관리자 로그</h2>
    </section>

    <th:block th:replace="~{admin/logs/admin-log-list-fragments/admin-log-search-form :: adminLogFilterForm}"></th:block>

    <th:block th:replace="~{admin/logs/admin-log-list-fragments/admin-log-table :: adminLogTable}"></th:block>

    <div id="adminLogSnapshotModal"
         class="admin-log-snapshot-modal hidden"
         aria-hidden="true">
        <div class="admin-log-snapshot-backdrop"
             data-admin-log-snapshot-close></div>

        <div class="admin-log-snapshot-dialog"
             role="dialog"
             aria-modal="true"
             aria-labelledby="adminLogSnapshotTitle">
            <div class="admin-log-snapshot-header">
                <h3 id="adminLogSnapshotTitle" class="card-title">관리자 로그 내용</h3>

                <button type="button"
                        class="btn btn-secondary btn-small"
                        data-admin-log-snapshot-close>
                    닫기
                </button>
            </div>

            <pre id="adminLogSnapshotContent"
                 class="admin-log-snapshot-content"></pre>
        </div>
    </div>

    <section class="card" th:if="${!logPage.isEmpty()}">
        <p th:text="|총 ${logPage.totalElements}건 · ${logPage.number + 1}/${logPage.totalPages} 페이지|"></p>

        <div class="actions"
             th:replace="~{fragments/pagination :: pager(
                ${logPage},
                @{/admin/logs},
                ${'searchType=' + condition.searchType
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&action=' + (condition.action != null ? condition.action : '')
                    + '&targetType=' + (condition.targetType != null ? condition.targetType : '')
                    + '&targetCommunityCode=' + (condition.targetCommunityCode != null ? condition.targetCommunityCode : '')
                    + '&period=' + condition.period
                    + '&startDate=' + (condition.startDate != null ? condition.startDate : '')
                    + '&endDate=' + (condition.endDate != null ? condition.endDate : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
        </div>
    </section>

    <th:block th:replace="~{admin/logs/admin-log-list-fragments/admin-log-search-form :: adminLogKeywordSearchForm}"></th:block>
</main>

<script th:inline="javascript">
    window.addEventListener('DOMContentLoaded', function () {
        if (window.PageSizeManager) {
            PageSizeManager.initPageSizeForm('adminLogFilterForm');
        }

        if (window.AdminLogSearchManager) {
            AdminLogSearchManager.init('adminLogFilterForm');
        }
    });
</script>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
