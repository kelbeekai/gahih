<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('회원 관리')}"></th:block>
    <script defer th:src="@{/js/common/page-size.js}"></script>
    <script defer th:src="@{/js/admin/admin-action-reason.js}"></script>
    <script defer th:src="@{/js/admin/admin-member-suspension.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container admin-container">
    <section class="card">
        <h2 class="card-title">회원 관리</h2>
    </section>

    <th:block th:replace="~{admin/members/member-list-fragments/admin-member-list-search-form :: adminMemberFilterForm}"></th:block>

    <th:block th:replace="~{admin/members/member-list-fragments/admin-member-list-table :: adminMemberTable}"></th:block>

    <section class="card" th:if="${!memberPage.isEmpty()}">
        <p th:text="|총 ${memberPage.totalElements}건 · ${memberPage.number + 1}/${memberPage.totalPages} 페이지|"></p>

        <div class="actions"
             th:replace="~{fragments/pagination :: pager(
                ${memberPage},
                @{/admin/members},
                ${'searchType=' + condition.searchType
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&role=' + (condition.role != null ? condition.role : '')
                    + '&status=' + (condition.status != null ? condition.status : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
        </div>
    </section>

    <th:block th:replace="~{admin/members/member-list-fragments/admin-member-list-search-form :: adminMemberKeywordSearchForm}"></th:block>
</main>

<script th:inline="javascript">
    window.addEventListener('DOMContentLoaded', function () {
        PageSizeManager.initPageSizeForm('adminMemberFilterForm');
    });
</script>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
