<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="recentPosts">
    <section class="card">
        <h3 class="card-title">최근 작성 게시글</h3>

        <div class="table-wrapper" th:if="${!#lists.isEmpty(memberDetail.recentPosts)}">
            <table class="common-table">
                <thead>
                <tr>
                    <th class="table-cell-id">ID</th>
                    <th class="table-cell-category">국가</th>
                    <th class="table-cell-category">카테고리</th>
                    <th class="table-cell-title">제목</th>
                    <th class="table-cell-date">작성일</th>
                    <th class="table-cell-status">상태</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="post : ${memberDetail.recentPosts}">
                    <td class="table-cell-id" th:text="${post.id}"></td>
                    <td class="table-cell-category" th:text="${post.communityName}"></td>
                    <td class="table-cell-category" th:text="${post.categoryName}"></td>
                    <td class="table-cell-title">
                        <span th:if="${post.secret}" class="icon-marker">🔒</span>
                        <a th:href="@{/c/{communityCode}/posts/{id}(
                                    communityCode=${post.communityCode},
                                    id=${post.id},
                                    source=${T(com.gahih.domain.post.enumtype.PostDetailSource).ADMIN_MEMBER_DETAIL},
                                    returnUrl=${memberDetailReturnUrl}
                            )}"
                           th:text="${post.title}"></a>
                    </td>
                    <td class="table-cell-date">
                        <span th:text="${#temporals.format(post.displayTime, 'yyyy-MM-dd HH:mm')}"></span>
                        <span th:if="${post.edited}" class="detail-small-muted detail-inline-spaced">(수정됨)</span>
                    </td>
                    <td class="table-cell-status" th:text="${post.status}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <p th:if="${#lists.isEmpty(memberDetail.recentPosts)}">최근 작성 게시글이 없습니다.</p>
    </section>
</th:block>

</html>
