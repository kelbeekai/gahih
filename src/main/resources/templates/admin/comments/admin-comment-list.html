<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('관리자 댓글 관리')}"></th:block>
    <script defer th:src="@{/js/common/page-size.js}"></script>
    <script defer th:src="@{/js/admin-action-reason.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container admin-container">

    <section class="card">
        <h2 class="card-title" th:if="${currentCommunity == null}">
            전체 댓글 관리
        </h2>

        <h2 class="card-title"
            th:if="${currentCommunity != null}"
            th:text="|${currentCommunity.name} 댓글 관리|">
            국가 댓글 관리
        </h2>
    </section>

    <section class="card">
        <form id="commentSearchForm"
              th:action="${currentCommunity != null}
                  ? @{/c/{communityCode}/admin/comments(communityCode=${currentCommunity.code})}
                  : @{/admin/comments}"
              method="get"
              class="search-form">
            <input type="hidden" name="page" th:value="${commentPage.number + 1}">
            <input type="hidden" data-role="current-page" th:value="${commentPage.number + 1}">
            <input type="hidden" data-role="current-size" th:value="${commentPage.size}">

            <div class="form-group">
                <label class="form-label" for="searchType">검색 기준</label>
                <select class="form-control" id="searchType" name="searchType">
                    <option th:each="type : ${searchTypes}"
                            th:value="${type.name()}"
                            th:text="${type.description}"
                            th:selected="${condition.searchType == type}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="keyword">검색어</label>
                <input class="form-control"
                       id="keyword"
                       type="text"
                       name="keyword"
                       th:value="${condition.keyword}"
                       placeholder="댓글 내용, 작성자, 게시글 제목, ID 검색">
            </div>

            <div class="form-group">
                <label class="form-label" for="status">상태</label>
                <select class="form-control" id="status" name="status">
                    <option value="" th:selected="${condition.status == null}">전체</option>
                    <option th:each="statusValue : ${statuses}"
                            th:value="${statusValue.name()}"
                            th:text="${statusValue.name()}"
                            th:selected="${condition.status == statusValue}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="sort">정렬</label>
                <select class="form-control" id="sort" name="sort">
                    <option th:each="sortType : ${sortTypes}"
                            th:value="${sortType.name()}"
                            th:text="${sortType.description}"
                            th:selected="${condition.sort == sortType}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="size">목록 수</label>
                <select class="form-control" id="size" name="size" data-role="page-size-select">
                    <option value="20" th:selected="${condition.safeSize == 20}">20개씩</option>
                    <option value="40" th:selected="${condition.safeSize == 40}">40개씩</option>
                    <option value="60" th:selected="${condition.safeSize == 60}">60개씩</option>
                </select>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">적용</button>
                <a class="btn btn-secondary"
                   th:if="${currentCommunity != null}"
                   th:href="@{/c/{communityCode}/admin/comments(communityCode=${currentCommunity.code})}">
                    초기화
                </a>

                <a class="btn btn-secondary"
                   th:if="${currentCommunity == null}"
                   th:href="@{/admin/comments}">
                    초기화
                </a>
            </div>
        </form>
    </section>

    <th:block th:fragment="commentsSearchHiddenFields(condition)">
        <input type="hidden" name="searchType" th:value="${condition.searchType}">
        <input type="hidden" name="keyword" th:value="${condition.keyword}">
        <input type="hidden" name="status" th:value="${condition.status}">
        <input type="hidden" name="sort" th:value="${condition.sort}">
        <input type="hidden" name="size" th:value="${condition.safeSize}">
        <input type="hidden" name="page" th:value="${commentPage.number + 1}">
    </th:block>

    <section class="card">
        <div class="table-wrapper admin-table-wrap">
            <table class="common-table">
                <thead>
                    <tr>
                        <th class="table-cell-id">댓글 ID</th>
                        <th class="table-cell-category" th:if="${currentCommunity == null}">국가</th>
                        <th class="table-cell-id">게시글 ID</th>
                        <th class="table-cell-title">게시글 제목</th>
                        <th class="table-cell-writer">작성자</th>
                        <th class="table-cell-text">댓글</th>
                        <th class="table-cell-number">좋아요</th>
                        <th class="table-cell-number">싫어요</th>
                        <th class="table-cell-status">상태</th>
                        <th class="table-cell-status">신고(미조치/총)</th>
                        <th class="table-cell-date">작성일</th>
                        <th class="table-cell-action">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${commentPage.isEmpty()}">
                        <td colspan="12">등록된 댓글이 없습니다.</td>
                    </tr>

                    <tr th:each="comment : ${commentPage.content}">
                        <td class="table-cell-id" th:text="${comment.id}"></td>
                        <td class="table-cell-category" th:if="${currentCommunity == null}" th:text="${comment.communityName}">국가</td>
                        <td class="table-cell-id" th:text="${comment.postId}"></td>

                        <td class="table-cell-title">
                            <span class="table-title-text">
                                <a th:href="@{/c/{communityCode}/posts/{id}(
                                        communityCode=${currentCommunity != null ? currentCommunity.code : comment.communityCode},
                                        id=${comment.postId},
                                        source=${T(com.gahih.domain.post.enumtype.PostDetailSource).ADMIN_COMMENTS},
                                        returnUrl=${currentCommunity != null
                                            ? '/c/' + currentCommunity.code + '/admin/comments?searchType=' + condition.searchType + '&keyword=' + (condition.keyword != null ? condition.keyword : '') + '&status=' + (condition.status != null ? condition.status.name() : '') + '&sort=' + condition.sort + '&size=' + condition.safeSize + '&page=' + (commentPage.number + 1)
                                            : '/admin/comments?searchType=' + condition.searchType + '&keyword=' + (condition.keyword != null ? condition.keyword : '') + '&status=' + (condition.status != null ? condition.status.name() : '') + '&sort=' + condition.sort + '&size=' + condition.safeSize + '&page=' + (commentPage.number + 1)}
                                    )}"
                                   th:text="${comment.postTitle}">
                                </a>
                            </span>
                        </td>

                        <td class="table-cell-writer" th:text="${comment.writerNickname}"></td>

                        <td class="table-cell-text">
                            <span th:if="${comment.deletedOrBlinded}"
                                  class="status-label"
                                  th:text="${'[' + comment.status.name() + ']'}"></span>
                            <span class="table-title-text" th:text="${comment.contentSummary}"></span>
                        </td>

                        <td class="table-cell-number" th:text="${comment.likeCount}"></td>
                        <td class="table-cell-number" th:text="${comment.dislikeCount}"></td>
                        <td class="table-cell-status" th:text="${comment.status.name()}"></td>
                        <td class="table-cell-status" th:text="${comment.reportSummary}"></td>

                        <td class="table-cell-date">
                            <span th:text="${#temporals.format(comment.displayTime, 'yyyy-MM-dd HH:mm')}"></span>
                            <span th:if="${comment.edited}"
                                  class="detail-small-muted detail-inline-spaced">
                                (수정됨)
                            </span>
                        </td>

                        <td class="table-cell-action">
                            <form th:if="${comment.canAdminBlind}"
                                  th:action="${currentCommunity != null}
                                    ? @{/c/{communityCode}/admin/comments/{id}/blind-from-list(
                                        communityCode=${currentCommunity.code},
                                        id=${comment.id}
                                      )}
                                    : @{/admin/comments/{id}/blind-from-list(id=${comment.id})}"
                                  method="post"
                                  class="inline-form">

                                <th:block th:replace="~{admin/comments :: commentsSearchHiddenFields(${condition})}"></th:block>
                                <button class="btn btn-danger btn-small" type="submit">블라인드</button>
                            </form>

                            <form th:if="${comment.canAdminRestore}"
                                  th:action="${currentCommunity != null}
                                    ? @{/c/{communityCode}/admin/comments/{id}/restore-from-list(
                                        communityCode=${currentCommunity.code},
                                        id=${comment.id}
                                      )}
                                    : @{/admin/comments/{id}/restore-from-list(id=${comment.id})}"
                                  method="post"
                                  class="inline-form">

                                <th:block th:replace="~{admin/comments :: commentsSearchHiddenFields(${condition})}"></th:block>
                                <button class="btn btn-secondary btn-small" type="submit">복구</button>
                            </form>

                            <form th:if="${comment.canAdminDelete}"
                                  th:action="${currentCommunity != null}
                                    ? @{/c/{communityCode}/admin/comments/{id}/delete-from-list(
                                        communityCode=${currentCommunity.code},
                                        id=${comment.id}
                                      )}
                                    : @{/admin/comments/{id}/delete-from-list(id=${comment.id})}"
                                  method="post"
                                  class="inline-form">

                                <th:block th:replace="~{admin/comments :: commentsSearchHiddenFields(${condition})}"></th:block>
                                <button class="btn btn-danger btn-small" type="submit">삭제</button>
                            </form>

                            <form th:if="${comment.canAdminHardDelete}"
                                  th:action="${currentCommunity != null}
                                    ? @{/c/{communityCode}/admin/comments/{id}/hard-delete-from-list(
                                        communityCode=${currentCommunity.code},
                                        id=${comment.id}
                                      )}
                                    : @{/admin/comments/{id}/hard-delete-from-list(id=${comment.id})}"
                                  method="post"
                                  class="inline-form"
                                  data-reason-required="true"
                                  data-reason-label="댓글 영구삭제 사유"
                                  data-reason-message="댓글 영구삭제 사유를 입력해주세요."
                                  data-confirm-message="이 댓글을 영구삭제하시겠습니까? 되돌릴 수 없습니다.">

                                <th:block th:replace="~{admin/comments :: commentsSearchHiddenFields(${condition})}"></th:block>
                                <button class="btn btn-danger btn-small" type="submit">영구삭제</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="card" th:if="${!commentPage.isEmpty()}">
        <p th:text="|총 ${commentPage.totalElements}건 · ${commentPage.number + 1}/${commentPage.totalPages} 페이지|"></p>

        <th:block th:if="${currentCommunity != null}">
            <div class="actions"
                 th:replace="~{fragments/pagination :: pager(
                ${commentPage},
                @{/c/{communityCode}/admin/comments(communityCode=${currentCommunity.code})},
                ${'searchType=' + condition.searchType
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&status=' + (condition.status != null ? condition.status : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
            </div>
        </th:block>

        <th:block th:if="${currentCommunity == null}">
            <div class="actions"
                 th:replace="~{fragments/pagination :: pager(
                ${commentPage},
                @{/admin/comments},
                ${'searchType=' + condition.searchType
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&status=' + (condition.status != null ? condition.status : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
            </div>
        </th:block>
    </section>

    <section class="card">
        <div class="actions">
            <a class="btn btn-secondary"
               th:if="${currentCommunity != null}"
               th:href="@{/c/{communityCode}/admin(communityCode=${currentCommunity.code})}">
                국가 관리자 홈으로
            </a>

            <a class="btn btn-secondary"
               th:if="${currentCommunity == null}"
               th:href="@{/admin}">
                관리자 홈으로
            </a>
        </div>
    </section>
</main>

<script th:inline="javascript">
    window.addEventListener('DOMContentLoaded', function () {
        PageSizeManager.initPageSizeForm('commentSearchForm');
    });
</script>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
