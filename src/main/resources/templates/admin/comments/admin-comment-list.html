<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('관리자 댓글 관리')}"></th:block>
    <script defer th:src="@{/js/common/page-size.js}"></script>
    <script defer th:src="@{/js/admin/admin-action-reason.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container admin-container">

    <section class="card">
        <h2 class="card-title" th:if="${currentCommunity == null}">
            전체 댓글 관리
        </h2>

        <h2 class="card-title"
            th:if="${currentCommunity != null}"
            th:text="|${currentCommunity.name} 댓글 관리|">
            국가 댓글 관리
        </h2>
    </section>

    <th:block th:replace="~{admin/comments/fragments/admin-comment-search-form :: adminCommentFilterForm}"></th:block>

    <th:block th:replace="~{admin/comments/fragments/admin-comment-table :: adminCommentTable}"></th:block>

    <section class="card" th:if="${!commentPage.isEmpty()}">
        <p th:text="|총 ${commentPage.totalElements}건 · ${commentPage.number + 1}/${commentPage.totalPages} 페이지|"></p>

        <th:block th:if="${currentCommunity != null}">
            <div class="actions"
                 th:replace="~{fragments/pagination :: pager(
                ${commentPage},
                @{/c/{communityCode}/admin/comments(communityCode=${currentCommunity.code})},
                ${'searchType=' + condition.searchType
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&status=' + (condition.status != null ? condition.status : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
            </div>
        </th:block>

        <th:block th:if="${currentCommunity == null}">
            <div class="actions"
                 th:replace="~{fragments/pagination :: pager(
                ${commentPage},
                @{/admin/comments},
                ${'searchType=' + condition.searchType
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&status=' + (condition.status != null ? condition.status : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
            </div>
        </th:block>
    </section>

    <th:block th:replace="~{admin/comments/fragments/admin-comment-search-form :: adminCommentKeywordSearchForm}"></th:block>

    <section class="card">
        <div class="actions">
            <a class="btn btn-secondary"
               th:if="${currentCommunity != null}"
               th:href="@{/c/{communityCode}/admin(communityCode=${currentCommunity.code})}">
                국가 관리자 홈으로
            </a>

            <a class="btn btn-secondary"
               th:if="${currentCommunity == null}"
               th:href="@{/admin}">
                관리자 홈으로
            </a>
        </div>
    </section>
</main>

<script th:inline="javascript">
    window.addEventListener('DOMContentLoaded', function () {
        if (window.PageSizeManager) {
            PageSizeManager.initPageSizeForm('adminCommentFilterForm');
        }
    });
</script>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
