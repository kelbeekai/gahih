<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('관리자 페이지')}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container admin-container">
    <section class="card">
        <h2 class="card-title">국가별 관리자 페이지</h2>

        <ul class="board-summary-list">
            <li th:each="community : ${communities}">
                <strong th:text="${community.name}">국가명</strong>
                <a class="btn btn-secondary btn-small"
                   th:href="@{/c/{communityCode}/admin(communityCode=${community.code})}">
                    관리자 페이지
                </a>
            </li>
        </ul>
    </section>

    <section class="card">
        <h2 class="card-title">관리자 페이지</h2>
        <p class="text-muted">관리자 기능을 사용할 수 있습니다.</p>

        <div class="actions">
            <a class="btn btn-secondary" th:href="@{/admin/members}">회원 관리</a>
            <a class="btn btn-secondary" th:href="@{/admin/posts}">전체 게시글 관리</a>
            <a class="btn btn-secondary" th:href="@{/admin/comments}">댓글 관리</a>
            <a class="btn btn-secondary" th:href="@{/admin/reports}">신고 관리</a>
            <a class="btn btn-secondary" th:href="@{/admin/reporter-activities}">신고 활동 회원</a>
            <a class="btn btn-secondary" th:href="@{/admin/logs}">관리자 로그</a>
            <a class="btn btn-secondary" th:href="@{/admin/nickname-histories}">닉네임 이력 조회</a>
            <a class="btn btn-secondary" th:href="@{/admin/nickname-reservations}">닉네임 예약 현황</a>
        </div>
    </section>
</main>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
