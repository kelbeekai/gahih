<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('닉네임 이력 조회')}"></th:block>
    <script defer th:src="@{/js/common/page-size.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container admin-container">
    <section class="card">
        <h2 class="card-title">닉네임 이력 조회</h2>
    </section>

    <section class="card search-card search-card-top-card">
        <form id="adminNicknameHistoryFilterForm"
              th:action="@{/admin/nickname-histories}"
              method="get"
              class="search-toolbar-form">

            <input type="hidden" name="page" th:value="${historyPage.number + 1}">
            <input type="hidden" data-role="current-page" th:value="${historyPage.number + 1}">
            <input type="hidden" data-role="current-size" th:value="${historyPage.size}">

            <input type="hidden" name="searchType" th:value="${condition.searchType}">
            <input type="hidden" name="keyword" th:value="${condition.keyword}">

            <div class="search-toolbar-left">
                <span class="filter-label">구분</span>
                <select class="form-control search-control-compact"
                        id="changeType"
                        name="changeType"
                        data-role="instant-search-control">
                    <option value="">전체</option>
                    <option value="INITIAL" th:selected="${condition.changeType == 'INITIAL'}">최초 설정</option>
                    <option value="CHANGE" th:selected="${condition.changeType == 'CHANGE'}">닉네임 변경</option>
                </select>

                <select class="form-control search-control-compact"
                        id="sort"
                        name="sort"
                        data-role="instant-search-control">
                    <option th:each="sortType : ${sortTypes}"
                            th:value="${sortType.name()}"
                            th:text="${sortType.displayName}"
                            th:selected="${condition.sort == sortType}">
                    </option>
                </select>

                <select class="form-control search-control-compact"
                        id="size"
                        name="size"
                        data-role="page-size-select">
                    <option value="20" th:selected="${condition.safeSize == 20}">20개씩</option>
                    <option value="40" th:selected="${condition.safeSize == 40}">40개씩</option>
                    <option value="60" th:selected="${condition.safeSize == 60}">60개씩</option>
                </select>
            </div>

            <div class="search-toolbar-right"></div>
        </form>
    </section>

    <section class="card context-list-card">
        <div class="table-wrapper admin-table-wrap">
            <table class="common-table">
                <thead>
                    <tr>
                        <th class="table-cell-id">ID</th>
                        <th class="table-cell-id">회원 ID</th>
                        <th class="table-cell-writer">현재 닉네임</th>
                        <th class="table-cell-status">구분</th>
                        <th class="table-cell-writer">이전 닉네임</th>
                        <th class="table-cell-writer">변경 후 닉네임</th>
                        <th class="table-cell-date">변경 시각</th>
                    </tr>
                </thead>
                <tbody>
                <tr th:if="${historyPage.isEmpty()}">
                    <td colspan="7">저장된 닉네임 이력이 없습니다.</td>
                </tr>

                <tr th:each="history : ${historyPage.content}">
                    <td class="table-cell-id" th:text="${history.id}"></td>
                    <td class="table-cell-id" th:text="${history.memberId}"></td>

                    <td class="table-cell-writer">
                        <span class="table-title-text" th:text="${history.displayCurrentNickname}"></span>
                    </td>

                    <td class="table-cell-status" th:text="${history.displayChangeType}"></td>

                    <td class="table-cell-writer">
                        <span class="table-title-text" th:text="${history.displayPreviousNickname}"></span>
                    </td>

                    <td class="table-cell-writer">
                        <span class="table-title-text" th:text="${history.displayNewNickname}"></span>
                    </td>

                    <td class="table-cell-date" th:text="${#temporals.format(history.changedAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="card" th:if="${!historyPage.isEmpty()}">
        <p th:text="|총 ${historyPage.totalElements}건 · ${historyPage.number + 1}/${historyPage.totalPages} 페이지|"></p>

        <div class="actions"
             th:replace="~{fragments/pagination :: pager(
                ${historyPage},
                @{/admin/nickname-histories},
                ${'searchType=' + condition.searchType
                    + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                    + '&changeType=' + (condition.changeType != null ? condition.changeType : '')
                    + '&sort=' + condition.sort
                    + '&size=' + condition.safeSize}
             )}">
        </div>
    </section>

    <section class="card search-card search-card-bottom-card">
        <form id="adminNicknameHistoryKeywordSearchForm"
              th:action="@{/admin/nickname-histories}"
              method="get"
              class="search-keyword-form">

            <input type="hidden" name="page" value="1">
            <input type="hidden" name="changeType" th:value="${condition.changeType}">
            <input type="hidden" name="sort" th:value="${condition.sort}">
            <input type="hidden" name="size" th:value="${condition.safeSize}">

            <div class="search-keyword-row">
                <select class="form-control search-control-compact search-type-control"
                        id="searchType"
                        name="searchType">
                    <option th:each="searchType : ${searchTypes}"
                            th:value="${searchType.name()}"
                            th:text="${searchType.displayName}"
                            th:selected="${condition.searchType == searchType}">
                    </option>
                </select>

                <input class="form-control search-keyword-input"
                       id="keyword"
                       type="text"
                       name="keyword"
                       th:value="${condition.keyword}"
                       placeholder="선택한 조건으로 검색">

                <button class="btn btn-primary btn-small search-nowrap-button"
                        type="submit">
                    검색
                </button>

                <a class="btn btn-secondary btn-small search-nowrap-button"
                   th:href="@{/admin/nickname-histories}">
                    초기화
                </a>
            </div>
        </form>
    </section>

    <section class="card">
        <div class="actions">
            <a class="btn btn-secondary" th:href="@{/admin}">
                관리자 홈으로
            </a>
        </div>
    </section>
</main>


<script th:inline="javascript">
    window.addEventListener('DOMContentLoaded', function () {
        if (window.PageSizeManager) {
            PageSizeManager.initPageSizeForm('adminNicknameHistoryFilterForm');
        }
    });
</script>

<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
