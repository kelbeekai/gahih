<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHeadContent('게시글 관리')}"></th:block>
    <script defer th:src="@{/js/common/page-size.js}"></script>
    <script defer th:src="@{/js/admin/admin-action-reason.js}"></script>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader(${loginMember})}"></div>

<main class="site-container admin-container">
    <section class="card">
        <h2 class="card-title" th:if="${currentCommunity == null}">
            전체 게시글 관리
        </h2>

        <h2 class="card-title"
            th:if="${currentCommunity != null}"
            th:text="|${currentCommunity.name} 게시글 관리|">
            국가 게시글 관리
        </h2>
    </section>

    <th:block th:replace="~{admin/posts/fragments/admin-post-search-form :: adminPostFilterForm}"></th:block>

    <th:block th:replace="~{admin/posts/fragments/admin-post-table :: adminPostTable}"></th:block>

    <section class="card" th:if="${!postPage.isEmpty()}">
        <p th:text="|총 ${postPage.totalElements}건 · ${postPage.number + 1}/${postPage.totalPages} 페이지|"></p>

        <th:block th:if="${currentCommunity != null}">
            <div class="actions"
                 th:replace="~{fragments/pagination :: pager(
                    ${postPage},
                    @{/c/{communityCode}/admin/posts(communityCode=${currentCommunity.code})},
                    ${'categoryId=' + (condition.categoryId != null ? condition.categoryId : '')
                        + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                        + '&secret=' + (condition.secret != null ? condition.secret : '')
                        + '&sort=' + condition.sort
                        + '&onlyWithAttachments=' + condition.onlyWithAttachments
                        + '&size=' + condition.safeSize}
                 )}">
            </div>
        </th:block>

        <th:block th:if="${currentCommunity == null}">
            <div class="actions"
                 th:replace="~{fragments/pagination :: pager(
                    ${postPage},
                    @{/admin/posts},
                    ${'categoryId=' + (condition.categoryId != null ? condition.categoryId : '')
                        + '&keyword=' + (condition.keyword != null ? condition.keyword : '')
                        + '&secret=' + (condition.secret != null ? condition.secret : '')
                        + '&sort=' + condition.sort
                        + '&onlyWithAttachments=' + condition.onlyWithAttachments
                        + '&size=' + condition.safeSize}
                 )}">
            </div>
        </th:block>

    </section>

    <th:block th:replace="~{admin/posts/fragments/admin-post-search-form :: adminPostKeywordSearchForm}"></th:block>
</main>
<script th:inline="javascript">
    window.addEventListener('DOMContentLoaded', function () {
        if (window.PageSizeManager) {
            PageSizeManager.initPageSizeForm('adminPostFilterForm');
        }
    });
</script>
<div th:replace="~{fragments/header :: siteFooter}"></div>
</body>
</html>
