# open-in-view 명시
spring.jpa.open-in-view=true

spring.application.name=gahih

# 기본 프로필
spring.profiles.active=dev

# 커스텀 에러 페이지 사용
server.error.whitelabel.enabled=false

# 파일 업로드 공통 제한
spring.servlet.multipart.max-file-size=11MB
spring.servlet.multipart.max-request-size=31MB

# 메일 공통 설정
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GAHIH_MAIL_USERNAME}
spring.mail.password=${GAHIH_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

app.email-auth.code-expiration-seconds=180
app.email-auth.resend-interval-seconds=30
app.email-auth.max-request-count=5
app.email-auth.password-reset-session-expiration-seconds=600
app.email-auth.minimum-response-millis=1500
app.email-auth.response-jitter-min-millis=300
app.email-auth.response-jitter-max-millis=700

app.email-async.core-pool-size=2
app.email-async.max-pool-size=4
app.email-async.queue-capacity=100

app.email-auth.cleanup.verified-retention-minutes=30
app.email-auth.cleanup.used-reset-session-retention-minutes=30
app.email-auth.cleanup.max-retention-hours=24

# 방문자 통계 집계 방식
# PUBLIC_COOKIE: 비로그인 공개 요청도 쿠키 기준으로 집계
# LOGIN_MEMBER_DAILY: 로그인한 일반 회원만 한국 시간 기준 하루 1회 집계
app.visit.count-mode=LOGIN_MEMBER_DAILY

# Spring Security 기본 개발용 사용자 자동 생성을 사용하지 않음.
# 추후 변경 사항이 있을 때까지 초기 구현 가힣는 자체 회원 로그인 + 세션 + 인터셉터 방식으로 인증을 처리함.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration